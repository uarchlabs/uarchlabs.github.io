<svg viewBox="0 0 740 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#444"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#15803d"/>
    </marker>
    <marker id="arr-b" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arr-r" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#be185d"/>
    </marker>
    <marker id="arr-y" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#a16207"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="370" y="16" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#111">bp_history: Structural View</text>

  <!-- ═══════════════════════════════════════════════
       BLOCK 1: ghr_mem
       ═══════════════════════════════════════════════ -->
  <rect x="210" y="30" width="170" height="110" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="295" y="50"  text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af">ghr_mem</text>
  <text x="295" y="65"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#555">256b register array</text>
  <line x1="220" y1="72" x2="370" y2="72" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="295" y="86"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">write addr:  ghist_ptr</text>
  <text x="295" y="99"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">write data:  pred_taken</text>
  <text x="295" y="112" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">write count: num_branches</text>
  <text x="295" y="131" text-anchor="middle" font-family="monospace" font-size="9"  fill="#be185d">rb addr:     rollback_ghist_ptr</text>

  <!-- ═══════════════════════════════════════════════
       BLOCK 2: phr_mem
       ═══════════════════════════════════════════════ -->
  <rect x="210" y="172" width="170" height="100" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="295" y="192" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#1e40af">phr_mem</text>
  <text x="295" y="207" text-anchor="middle" font-family="monospace" font-size="9"  fill="#555">32b register array</text>
  <line x1="220" y1="214" x2="370" y2="214" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="295" y="228" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">write addr:  phist_ptr</text>
  <text x="295" y="241" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">write data:  pc[2]^pc[3]</text>
  <text x="295" y="254" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">write count: num_branches</text>
  <text x="295" y="266" text-anchor="middle" font-family="monospace" font-size="9"  fill="#be185d">rb addr:     rollback_phist_ptr</text>

  <!-- ═══════════════════════════════════════════════
       BLOCK 3: Fold registers (bp_folded_hist_t)
       ═══════════════════════════════════════════════ -->
  <rect x="440" y="30" width="180" height="176" rx="3" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="530" y="50"  text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#14532d">Fold Registers</text>
  <text x="530" y="65"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#555">bp_folded_hist_t</text>
  <line x1="450" y1="72" x2="610" y2="72" stroke="#15803d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="530" y="87"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">TAGE T1-T4    12 folds</text>
  <text x="530" y="100" text-anchor="middle" font-family="monospace" font-size="9"  fill="#888">(T0 has no history)</text>
  <line x1="450" y1="107" x2="610" y2="107" stroke="#15803d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="530" y="122" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">ITTAGE IT1-IT4  12 folds</text>
  <text x="530" y="135" text-anchor="middle" font-family="monospace" font-size="9"  fill="#888">(IT5 has no history)</text>
  <line x1="450" y1="142" x2="610" y2="142" stroke="#15803d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="530" y="157" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">SC ST1-ST3      3 folds</text>
  <text x="530" y="170" text-anchor="middle" font-family="monospace" font-size="9"  fill="#888">(ST0 ST4 have no history)</text>
  <line x1="450" y1="177" x2="610" y2="177" stroke="#15803d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="530" y="192" text-anchor="middle" font-family="monospace" font-size="9"  fill="#555">read:  ghr_mem + ghist_ptr</text>
  <text x="530" y="205" text-anchor="middle" font-family="monospace" font-size="9"  fill="#be185d">rb:    rollback_en</text>

  <!-- ═══════════════════════════════════════════════
       BLOCK 4: Checkpoint register array
       ═══════════════════════════════════════════════ -->
  <rect x="210" y="308" width="410" height="88" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="415" y="328" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#78350f">Checkpoint Register Array</text>
  <line x1="220" y1="335" x2="610" y2="335" stroke="#ca8a04" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="415" y="350" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">ckpt_gptr[FTQ_DEPTH]  8b x 64  =  512b</text>
  <text x="415" y="363" text-anchor="middle" font-family="monospace" font-size="9"  fill="#333">ckpt_pptr[FTQ_DEPTH]  5b x 64  =  320b</text>
  <text x="415" y="376" text-anchor="middle" font-family="monospace" font-size="9"  fill="#555">write addr: ckpt_idx (FTQ slot index, 6b)</text>
  <text x="415" y="389" text-anchor="middle" font-family="monospace" font-size="9"  fill="#555">write data: ghist_ptr (current)  +  phist_ptr (current)</text>

  <!-- ═══════════════════════════════════════════════
       INTERNAL CONNECTIONS
       ═══════════════════════════════════════════════ -->

  <!-- ghr_mem -> fold registers (read data) -->
  <line x1="380" y1="76" x2="438" y2="76" stroke="#15803d" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="409" y="70" text-anchor="middle" font-family="monospace" font-size="8" fill="#15803d">read</text>

  <!-- phr_mem -> fold registers (not currently used shown dashed) -->
  <line x1="380" y1="222" x2="410" y2="222" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="410" y1="222" x2="410" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="410" y1="160" x2="438" y2="160" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <text x="412" y="195" font-family="monospace" font-size="8" fill="#94a3b8">deferred</text>

  <!-- ghist_ptr internal routing to fold registers and checkpoint array -->
  <!-- ghist_ptr input line enters ghr_mem; branch goes right to fold regs and down to checkpoint -->
  <!-- shown as a bus tap from the input signal -->

  <!-- ghr_mem ghist_ptr out -> checkpoint array -->
  <line x1="295" y1="140" x2="295" y2="170" stroke="#ca8a04" stroke-width="1.2" stroke-dasharray="2,2"/>
  <line x1="295" y1="170" x2="295" y2="306" stroke="#ca8a04" stroke-width="1.2" stroke-dasharray="2,2" marker-end="url(#arr-y)"/>

  <!-- phist_ptr out -> checkpoint array -->
  <line x1="315" y1="272" x2="315" y2="306" stroke="#ca8a04" stroke-width="1.2" stroke-dasharray="2,2" marker-end="url(#arr-y)"/>

  <!-- ═══════════════════════════════════════════════
       INPUT SIGNALS
       ═══════════════════════════════════════════════ -->

  <!-- Prediction update group -->
  <text x="4" y="28" font-family="monospace" font-size="8" fill="#666">pred update</text>

  <text x="4" y="56" font-family="monospace" font-size="10" fill="#222">pred_taken[1:0]</text>
  <line x1="108" y1="54" x2="208" y2="88" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <text x="4" y="72" font-family="monospace" font-size="10" fill="#222">num_branches[1:0]</text>
  <line x1="118" y1="70" x2="208" y2="105" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- num_branches also goes to phr_mem -->
  <line x1="118" y1="70" x2="160" y2="70" stroke="#444" stroke-width="1"/>
  <line x1="160" y1="70" x2="160" y2="248" stroke="#444" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="160" y1="248" x2="208" y2="248" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <text x="4" y="88" font-family="monospace" font-size="10" fill="#222">pred_pc</text>
  <line x1="60" y1="86" x2="208" y2="235" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- External pointer inputs -->
  <text x="4" y="116" font-family="monospace" font-size="8" fill="#1d4ed8">ext pointers</text>
  <text x="4" y="130" font-family="monospace" font-size="10" fill="#1d4ed8">ghist_ptr</text>
  <line x1="62" y1="128" x2="208" y2="80" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <text x="4" y="146" font-family="monospace" font-size="10" fill="#1d4ed8">phist_ptr</text>
  <line x1="62" y1="144" x2="208" y2="222" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Rollback inputs -->
  <text x="4" y="176" font-family="monospace" font-size="8" fill="#be185d">rollback</text>
  <text x="4" y="190" font-family="monospace" font-size="10" fill="#be185d">rollback_en</text>
  <line x1="72" y1="188" x2="208" y2="122" stroke="#be185d" stroke-width="1.2" marker-end="url(#arr-r)"/>
  <!-- rollback_en also to fold registers -->
  <line x1="72" y1="188" x2="138" y2="188" stroke="#be185d" stroke-width="1"/>
  <line x1="138" y1="188" x2="138" y2="196" stroke="#be185d" stroke-width="1"/>
  <line x1="138" y1="196" x2="438" y2="196" stroke="#be185d" stroke-width="1.2" marker-end="url(#arr-r)"/>

  <text x="4" y="210" font-family="monospace" font-size="10" fill="#be185d">rb_ghist_ptr</text>
  <line x1="74" y1="208" x2="208" y2="128" stroke="#be185d" stroke-width="1.2" marker-end="url(#arr-r)"/>

  <text x="4" y="226" font-family="monospace" font-size="10" fill="#be185d">rb_phist_ptr</text>
  <line x1="74" y1="224" x2="208" y2="260" stroke="#be185d" stroke-width="1.2" marker-end="url(#arr-r)"/>

  <!-- Checkpoint write inputs -->
  <text x="4" y="330" font-family="monospace" font-size="8" fill="#a16207">checkpoint</text>
  <text x="4" y="344" font-family="monospace" font-size="10" fill="#a16207">ckpt_wr_en</text>
  <line x1="72" y1="342" x2="208" y2="360" stroke="#ca8a04" stroke-width="1.2" marker-end="url(#arr-y)"/>

  <text x="4" y="360" font-family="monospace" font-size="10" fill="#a16207">ckpt_idx[5:0]</text>
  <line x1="76" y1="358" x2="208" y2="370" stroke="#ca8a04" stroke-width="1.2" marker-end="url(#arr-y)"/>

  <!-- System -->
  <text x="4" y="406" font-family="monospace" font-size="10" fill="#888">clk  rstn</text>
  <line x1="50" y1="404" x2="208" y2="404" stroke="#888" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════
       OUTPUT SIGNALS
       ═══════════════════════════════════════════════ -->

  <!-- folded output from fold registers -->
  <line x1="620" y1="118" x2="736" y2="118" stroke="#15803d" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="625" y="109" font-family="monospace" font-size="10" font-weight="bold" fill="#14532d">folded</text>
  <text x="625" y="132" font-family="monospace" font-size="9" fill="#555">(bp_folded_hist_t)</text>
  <text x="638" y="146" font-family="monospace" font-size="9" fill="#555">-> TAGE T1-T4</text>
  <text x="638" y="159" font-family="monospace" font-size="9" fill="#555">-> ITTAGE IT1-IT4</text>
  <text x="638" y="172" font-family="monospace" font-size="9" fill="#555">-> SC ST1-ST3</text>

  <!-- ghist_ptr output from ghr_mem -->
  <line x1="380" y1="58" x2="736" y2="58" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="625" y="52" font-family="monospace" font-size="10" fill="#1e40af">ghist_ptr (8b)</text>
  <text x="638" y="68" font-family="monospace" font-size="9" fill="#555">-> FTQ ckpt write</text>

  <!-- phist_ptr output from phr_mem -->
  <line x1="380" y1="192" x2="530" y2="192" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="530" y1="192" x2="530" y2="58" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- phist out arrow joins ghist_ptr output bus or goes separately -->
  <line x1="380" y1="200" x2="736" y2="200" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="625" y="194" font-family="monospace" font-size="10" fill="#1e40af">phist_ptr (5b)</text>
  <text x="638" y="208" font-family="monospace" font-size="9" fill="#555">-> FTQ ckpt write</text>

</svg>
