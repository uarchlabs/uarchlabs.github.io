<svg viewBox="0 0 780 225" xmlns="http://www.w3.org/2000/svg" style="background:#fff">

  <!-- Title -->
  <text x="390" y="17" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#111">Loop Predictor Entry Fields  (lp_entry_t)</text>
  <text x="390" y="31" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">MSB                                                                                              LSB</text>

  <!--
    Field layout (comment from bp_structs_pkg.sv):
    | 67    | 66:53 | 52:39 | 38:25    | 24:11    | 10:3 | 2:1 | 0 |
    | curs_v| curs  | tag   | past_itr | curr_itr | age  | cnf | v |
    | 1     | 14b   | 14b   | 14b      | 14b      | 8b   | 2b  | 1b|
    Total: 1+14+14+14+14+8+2+1 = 68b

    Display width allocation (total canvas 780px, fields from x=36 to x=756, = 720px):
    curs_v:   1b  -> 36px
    curs:    14b  -> 140px
    tag:     14b  -> 140px
    past_itr:14b  -> 140px
    curr_itr:14b  -> 140px
    age:      8b  -> 82px
    cnf:      2b  -> 36px
    v:        1b  -> 36px
    sum: 36+140+140+140+140+82+36+36 = 750... adjust to 720

    Scale: 720/68 = 10.59px per bit
    curs_v:    1 * 10.59 = 11  -> 36 (min)
    curs:     14 * 10.59 = 148 -> 148
    tag:      14 * 10.59 = 148 -> 148
    past_itr: 14 * 10.59 = 148 -> 148
    curr_itr: 14 * 10.59 = 148 -> 148
    age:       8 * 10.59 = 85  -> 56 (scaled back for room)
    cnf:       2 * 10.59 = 21  -> 36 (min)
    v:         1 * 10.59 = 11  -> 36 (min)

    sum: 36+148+148+148+148+56+36+36 = 756 - need 720
    Reduce curs, tag, past_itr, curr_itr each by 9: 139 each
    36+139+139+139+139+56+36+36 = 720
  -->

  <!-- curs_v: x=36, w=36 -->
  <rect x="36"  y="38" width="36"  height="52" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="54"  y="57" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#065f46">curs</text>
  <text x="54"  y="69" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#065f46">_v</text>
  <text x="54"  y="82" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">1b</text>

  <!-- curs: x=72, w=139 -->
  <rect x="72"  y="38" width="139" height="52" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="141" y="60" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#1e40af">curs</text>
  <text x="141" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">14b  (LP_ITR_BITS)</text>

  <!-- tag: x=211, w=139 -->
  <rect x="211" y="38" width="139" height="52" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="280" y="60" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#4c1d95">tag</text>
  <text x="280" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">14b  (LP_TAG_BITS)</text>

  <!-- past_itr: x=350, w=139 -->
  <rect x="350" y="38" width="139" height="52" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="419" y="57" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#9a3412">past</text>
  <text x="419" y="69" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#9a3412">_itr</text>
  <text x="419" y="82" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">14b  (LP_ITR_BITS)</text>

  <!-- curr_itr: x=489, w=139 -->
  <rect x="489" y="38" width="139" height="52" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="558" y="57" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#713f12">curr</text>
  <text x="558" y="69" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#713f12">_itr</text>
  <text x="558" y="82" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">14b  (LP_ITR_BITS)</text>

  <!-- age: x=628, w=56 -->
  <rect x="628" y="38" width="56"  height="52" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
  <text x="656" y="60" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#831843">age</text>
  <text x="656" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">8b</text>

  <!-- cnf: x=684, w=36 -->
  <rect x="684" y="38" width="36"  height="52" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="702" y="60" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#991b1b">cnf</text>
  <text x="702" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">2b</text>

  <!-- v: x=720, w=36 -->
  <rect x="720" y="38" width="36"  height="52" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="738" y="60" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#065f46">v</text>
  <text x="738" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">1b</text>

  <!-- Bit position tick marks and numbers below strip (y=90 baseline) -->
  <!-- Left edge: bit 67 -->
  <line x1="36"  y1="90" x2="36"  y2="100" stroke="#555" stroke-width="1"/>
  <text x="36"   y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">67</text>

  <!-- curs_v/curs boundary: bit 66 -->
  <line x1="72"  y1="90" x2="72"  y2="100" stroke="#555" stroke-width="1"/>
  <text x="72"   y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">66</text>

  <!-- curs/tag boundary: bit 52 -->
  <line x1="211" y1="90" x2="211" y2="100" stroke="#555" stroke-width="1"/>
  <text x="211"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">52</text>

  <!-- tag/past_itr boundary: bit 38 -->
  <line x1="350" y1="90" x2="350" y2="100" stroke="#555" stroke-width="1"/>
  <text x="350"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">38</text>

  <!-- past_itr/curr_itr boundary: bit 24 -->
  <line x1="489" y1="90" x2="489" y2="100" stroke="#555" stroke-width="1"/>
  <text x="489"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">24</text>

  <!-- curr_itr/age boundary: bit 10 -->
  <line x1="628" y1="90" x2="628" y2="100" stroke="#555" stroke-width="1"/>
  <text x="628"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">10</text>

  <!-- age/cnf boundary: bit 2 -->
  <line x1="684" y1="90" x2="684" y2="100" stroke="#555" stroke-width="1"/>
  <text x="684"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">2</text>

  <!-- cnf/v boundary: bit 0 -->
  <line x1="720" y1="90" x2="720" y2="100" stroke="#555" stroke-width="1"/>
  <text x="720"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">1</text>

  <!-- Right edge: bit 0 -->
  <line x1="756" y1="90" x2="756" y2="100" stroke="#555" stroke-width="1"/>
  <text x="756"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#444">0</text>

  <!-- Field notes below bit numbers -->
  <line x1="36" y1="120" x2="756" y2="120" stroke="#e2e8f0" stroke-width="1"/>

  <!-- curs_v note -->
  <text x="54"  y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#065f46">curs</text>
  <text x="54"  y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">valid</text>
  <text x="54"  y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">flag</text>

  <!-- curs note -->
  <text x="141" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e40af">speculative iter</text>
  <text x="141" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">progress cursor</text>
  <text x="141" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">(deferred, LI4)</text>

  <!-- tag note -->
  <text x="280" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#4c1d95">PC-derived tag</text>
  <text x="280" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">hash(PC)[13:0]</text>
  <text x="280" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">aliasing accepted</text>

  <!-- past_itr note -->
  <text x="419" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a3412">known loop</text>
  <text x="419" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">iteration count</text>
  <text x="419" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">at last exit</text>

  <!-- curr_itr note -->
  <text x="558" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#713f12">current iteration</text>
  <text x="558" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">counter (this trip)</text>
  <text x="558" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">reset at exit</text>

  <!-- age note -->
  <text x="656" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#831843">LRU age</text>
  <text x="656" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">victim</text>
  <text x="656" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">select</text>

  <!-- cnf note -->
  <text x="702" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#991b1b">conf</text>
  <text x="702" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">ctr</text>
  <text x="702" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">2b sat</text>

  <!-- v note -->
  <text x="738" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#065f46">valid</text>
  <text x="738" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">cleared</text>
  <text x="738" y="161" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">on reset</text>

  <!-- Total width annotation -->
  <line x1="36" y1="182" x2="756" y2="182" stroke="#aaa" stroke-width="1"/>
  <line x1="36"  y1="178" x2="36"  y2="186" stroke="#aaa" stroke-width="1"/>
  <line x1="756" y1="178" x2="756" y2="186" stroke="#aaa" stroke-width="1"/>
  <text x="396" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">68b total per entry  (1 + 14 + 14 + 14 + 14 + 8 + 2 + 1)</text>

  <!-- conf level note -->
  <text x="396" y="212" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">pred_is_loop=1 requires cnf == LP_CONF_LEVEL (2b saturated max = 3).  LP_TAG_BITS = LP_ITR_BITS = 14.  LP_AGE_BITS = 8.  LP_CNF_BITS = 2.</text>

</svg>

