<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="475" viewBox="0 0 680 475" xmlns="http://www.w3.org/2000/svg">
<title>RAS dual-stack structure</title>
<desc>The Return Address Stack uses a speculative persistent linked circular array with TOSW, TOSR, and BOS pointers alongside a separate commit stack updated at retirement. Each FTQ slot stores a snapshot of the three RAS pointers for rollback recovery.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, "Helvetica Neue", sans-serif; }
  </style>
</defs>

<rect width="680" height="475" fill="white"/>

<!-- Section headers -->
<text x="225" y="16" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Speculative stack</text>
<text x="225" y="32" text-anchor="middle" font-size="12" fill="#5F5E5A">persistent linked circular array · 48 entries</text>
<text x="526" y="16" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Commit stack</text>
<text x="526" y="32" text-anchor="middle" font-size="12" fill="#5F5E5A">conventional circular</text>

<!-- Slot 0: inactive -->
<rect x="120" y="44" width="210" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="136" y="61" font-size="12" fill="#888780" dominant-baseline="central">0</text>
<text x="225" y="61" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">empty</text>

<!-- Slot 1: active (BOS) -->
<rect x="120" y="83" width="210" height="34" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="136" y="100" font-size="12" fill="#3C3489" dominant-baseline="central">1</text>
<text x="225" y="100" text-anchor="middle" font-size="12" fill="#3C3489" dominant-baseline="central">ret_addr</text>

<!-- Slot 2: inactive -->
<rect x="120" y="122" width="210" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="136" y="139" font-size="12" fill="#888780" dominant-baseline="central">2</text>
<text x="225" y="139" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">empty</text>

<!-- Slot 3: active -->
<rect x="120" y="161" width="210" height="34" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="136" y="178" font-size="12" fill="#3C3489" dominant-baseline="central">3</text>
<text x="225" y="178" text-anchor="middle" font-size="12" fill="#3C3489" dominant-baseline="central">ret_addr</text>

<!-- Slot 4: inactive -->
<rect x="120" y="200" width="210" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="136" y="217" font-size="12" fill="#888780" dominant-baseline="central">4</text>
<text x="225" y="217" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">empty</text>

<!-- Slot 5: active -->
<rect x="120" y="239" width="210" height="34" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="136" y="256" font-size="12" fill="#3C3489" dominant-baseline="central">5</text>
<text x="225" y="256" text-anchor="middle" font-size="12" fill="#3C3489" dominant-baseline="central">ret_addr</text>

<!-- Slot 6: active, stack top (TOSR / TOSW) -->
<rect x="120" y="278" width="210" height="34" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="136" y="295" font-size="12" fill="#3C3489" dominant-baseline="central">6</text>
<text x="225" y="295" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489" dominant-baseline="central">ret_addr</text>

<!-- Slot 7: inactive -->
<rect x="120" y="317" width="210" height="34" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="136" y="334" font-size="12" fill="#888780" dominant-baseline="central">7</text>
<text x="225" y="334" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">empty</text>

<!-- NOS links (staggered L-paths from right edge x=330) -->
<path d="M330,295 L360,295 L360,256 L330,256" fill="none" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr)"/>
<path d="M330,256 L375,256 L375,178 L330,178" fill="none" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr)"/>
<path d="M330,178 L390,178 L390,100 L330,100" fill="none" stroke="#7F77DD" stroke-width="1" marker-end="url(#arr)"/>
<text x="394" y="140" font-size="12" fill="#7F77DD" dominant-baseline="central">NOS</text>

<!-- Pointer arrows (left margin) -->
<text x="106" y="100" text-anchor="end" font-size="12" fill="#2C2C2A" dominant-baseline="central">BOS</text>
<line x1="108" y1="100" x2="118" y2="100" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

<text x="106" y="290" text-anchor="end" font-size="12" fill="#2C2C2A" dominant-baseline="central">TOSR</text>
<line x1="108" y1="290" x2="118" y2="290" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

<text x="106" y="302" text-anchor="end" font-size="12" fill="#2C2C2A" dominant-baseline="central">TOSW</text>
<line x1="108" y1="302" x2="118" y2="302" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Post-execute annotation -->
<text x="225" y="364" text-anchor="middle" font-size="12" fill="#5F5E5A">post-execute update</text>

<!-- Dashed divider -->
<line x1="440" y1="44" x2="440" y2="355" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Commit stack: entry 0 (top) -->
<rect x="452" y="44" width="148" height="34" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<text x="526" y="61" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">ret_addr</text>

<!-- Commit entries 1-4 -->
<rect x="452" y="83" width="148" height="34" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="526" y="100" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">ret_addr</text>

<rect x="452" y="122" width="148" height="34" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="526" y="139" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">ret_addr</text>

<rect x="452" y="161" width="148" height="34" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="526" y="178" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">ret_addr</text>

<rect x="452" y="200" width="148" height="34" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="526" y="217" text-anchor="middle" font-size="12" fill="#085041" dominant-baseline="central">ret_addr</text>

<!-- Commit annotations -->
<text x="526" y="252" text-anchor="middle" font-size="12" fill="#5F5E5A">retirement update</text>
<text x="526" y="268" text-anchor="middle" font-size="12" fill="#5F5E5A">fallback when empty</text>

<!-- FTQ snapshot box -->
<rect x="100" y="385" width="330" height="62" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="265" y="406" text-anchor="middle" font-size="14" font-weight="500" fill="#633806" dominant-baseline="central">FTQ slot checkpoint (RAS)</text>
<text x="265" y="428" text-anchor="middle" font-size="12" fill="#633806" dominant-baseline="central">TOSR (6b)  |  TOSW (6b)  |  BOS (6b)</text>

</svg>
