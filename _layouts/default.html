<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  {% feed_meta %}
  {% seo %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #21272e;
      --bg-deep:      #1c2128;
      --surface:      #2a3038;
      --border:       #353f4a;
      --accent:       #b84c25;
      --accent-bright:#d96b3f;
      --text:         #e8ecf0;
      --muted:        #8a97a6;
      --mono:         monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--accent-bright); text-decoration: none; }
    a:hover { color: var(--text); }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      background: var(--bg-deep);
      border-bottom: 0.5px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-mark {
      width: 26px;
      height: 26px;
      border-radius: 5px;
      background: var(--surface);
      border: 0.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-mark svg { display: block; }

    .nav-wordmark {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .nav-wordmark span { color: var(--accent-bright); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    .nav-gh {
      border: 0.5px solid var(--border) !important;
      border-radius: 3px;
      padding: 5px 12px;
    }

    .nav-gh:hover {
      border-color: var(--accent) !important;
      color: var(--accent-bright) !important;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 32px 60px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 0.5px solid var(--border);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-deep);
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 10px;
      color: #404a55;
    }

    .footer-link {
      font-family: var(--mono);
      font-size: 10px;
      color: #404a55;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-link:hover { color: var(--muted); }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; }
      .nav-links { gap: 14px; }
      main { padding: 28px 16px 48px; }
      footer { padding: 12px 16px; flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>

  <script data-goatcounter="https://uarchlabs.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">
      <div class="nav-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3.5 3.5 L3.5 8.5 Q3.5 12.5 6 12.5 L10 12.5 Q12.5 12.5 12.5 8.5 L12.5 3.5" stroke="#d96b3f" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="1" y1="3.5" x2="15" y2="3.5" stroke="#8a97a6" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="8" cy="10" r="1.5" fill="#b84c25"/>
        </svg>
      </div>
      <span class="nav-wordmark">u<span>arch</span>labs</span>
    </a>
    <div class="nav-links">
      <a href="https://uarchlabs.com">home</a>
      <a href="/blog/">blog</a>
      <a href="/pacino/">pacino</a>
      <a href="https://github.com/uarchlabs" target="_blank" rel="noopener" class="nav-gh">github ↗</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <span class="footer-text">Copyright {{ site.time | date: '%Y' }} Jeff Nye — uarchlabs</span>
    <a class="footer-link" href="https://www.linkedin.com/in/jeff-nye-21353926" target="_blank" rel="noopener">linkedin ↗</a>
  </footer>

</body>
</html>
